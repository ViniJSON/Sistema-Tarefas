<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de tarefas</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="src/jquery-4.0.0.min.js" defer></script>
    <script src="src/app.js" defer ></script>
    <link rel="stylesheet" href="/libs/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
     <nav class="navbar bg-dark navbar-dark  navbar-expand-sm">
        <div class="container">
            <img src="/assets/img/logo.png" class="img img-logo" alt="">
            <div class="collapse navbar-collapse" id="menuNavbar">
                <div class="navbar-nav me-auto">
                    <a href="#" class="nav-link active">Principal</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="espacamento-50px"></div>

    <h1 class="fs-1 fw-bold text-primary text-center">Gerencie tarefas com eficiência.</h1>
    
   
    <div class="container my-5 border shadow-lg">
        <div class="row">
                <form id="formTarefa">
                    <div class="col-12">
                    <h2 class="text-center text-primary">Adicionar uma tarefa</h2>
                </div>
                <div class="col-12">
                    <label class="form-label fs-4 me-3 text-primary fw-bold">Titulo da tarefa</label>
                    <input type="text" id="titulo" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label fs-4 me-3 text-primary fw-bold">Descrição</label>
                    <input type="text" class="form-control" id="descricao" placeholder="Opcional">
                </div>          
                <div class="col-12">
                    <label class="form-label fs-4 me-3 text-primary fw-bold">Prioridade</label>
                </div>
                <div class="col-12">
                    <input type="radio" class="form-check-input" name="prioridade" value="baixa">
                    <label class="form-label fs-6 me-3">Baixa</label>
                    <input type="radio" class="form-check-input" name="prioridade" value="media">
                    <label class="form-label fs-6 me-3">Média</label>
                    <input type="radio" class="form-check-input" name="prioridade" value="alta">
                    <label class="form-label fs-6 me-3">Alta</label>
                </div>
                <div class="col-12">
                    <label class="form-label fs-4 me-3 mb-4 text-primary fw-bold">Data limite</label>
                    <input type="date" class="form-control" id="data">
                </div>
                <div class="col-12">
                    <label class="form-label fs-4 me-3 mb-4 text-primary fw-bold">Status</label>
                    <select class="form-select" id="status">
                        <option value="pendente">Pendente</option>
                        <option value="concluida">Concluída</option>
                    </select>
                </div>
                <div class="col-12 mt-4">
                    <button class="btn btn-outline-primary" type="button" id="btnObservacao" onclick="AdicionarObservacao()">Adicionar observação</button>
                </div>
                <div id="areaObservacao"></div>
                <div class="col-12">
                    <button type="submit" class="btn btn-outline-danger">Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="areaTabela"></div>
</body>
</html>
