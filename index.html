<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de tarefas</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="src/jquery-4.0.0.min.js" defer></script>
    <script src="src/app.js" defer ></script>
    <link rel="stylesheet" href="/libs/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar bg-dark navbar-dark navbar-expand-sm">
        <div class="container">
            <img src="/assets/img/logo.png" class="img img-logo" alt="Logo">
            <div class="collapse navbar-collapse" id="menuNavbar">
                <div class="navbar-nav me-auto">
                    <a href="#" class="nav-link active">Principal</a>
                </div>
            </div>
        </div>
    </nav>

    <h1 class="fs-1 fw-bold text-primary text-center mt-4">Gerencie tarefas com eficiência.</h1>
    
    <div class="container my-5 border shadow-lg bg-white p-4 rounded">
        <div class="row justify-content-center">
            <form id="formTarefa" class="col-12 col-md-10">
                <h2 class="text-center text-primary mb-3">Adicionar uma tarefa</h2>
                <div class="mb-3">
                    <label class="form-label fw-bold text-primary">Título da tarefa</label>
                    <input type="text" id="titulo" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-primary">Descrição</label>
                    <input type="text" class="form-control" id="descricao" placeholder="Opcional">
                </div>          
                <div class="mb-3">
                    <label class="form-label fw-bold text-primary">Prioridade</label>
                    <div class="d-flex gap-3 mt-2">
                        <div class="form-check">
                            <input type="radio" class="form-check-input" name="prioridade" value="Baixa" id="pBaixa">
                            <label class="form-label" for="pBaixa">Baixa</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" class="form-check-input" name="prioridade" value="Média" id="pMedia">
                            <label class="form-label" for="pMedia">Média</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" class="form-check-input" name="prioridade" value="Alta" id="pAlta">
                            <label class="form-label" for="pAlta">Alta</label>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-primary">Data limite</label>
                    <input type="date" class="form-control" id="data">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-primary">Status</label>
                    <select class="form-select" id="status">
                        <option value="Pendente">Pendente</option>
                        <option value="Concluída">Concluída</option>
                    </select>
                </div>
                <div class="mb-3">
                    <button type="button" class="btn btn-outline-primary" id="btnObservacao">+ Adicionar observação</button>
                </div>
                <div id="areaObservacao"></div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-outline-danger" id="btnSubmit">Concluir</button>
                </div>
            </form>
        </div>
    </div>

    <div id="areaTabela"></div>
</body>
</html>
